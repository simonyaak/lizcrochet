<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — LC&C</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FAF6F0;
      --charcoal: #2B2826;
      --terracotta: #C0392B;
      --sage: #9CAF88;
      --blush: #F2C6C2;
      --gold: #C9A876;
      --line: rgba(43, 40, 38, 0.12);
      --success: #27AE60;
      --error: #C0392B;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--cream);
      color: var(--charcoal);
      font-family: 'Work Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: rgba(250, 246, 240, 0.9);
      backdrop-filter: blur(10px);
      padding: 1.5rem 6vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: 0.04em;
      color: var(--charcoal);
      text-decoration: none;
    }

    .logo span {
      color: var(--terracotta);
    }

    .badge {
      background: rgba(192, 57, 43, 0.1);
      color: var(--terracotta);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 100px;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--charcoal);
      color: var(--charcoal);
      padding: 8px 18px;
      border-radius: 100px;
      font-family: 'Work Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-logout:hover {
      background: var(--charcoal);
      color: var(--cream);
    }

    .btn-view-site {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--cream);
      border: 1px solid var(--line);
      color: var(--charcoal);
      padding: 8px 18px;
      border-radius: 100px;
      font-family: 'Work Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
    }

    .btn-view-site:hover {
      background: var(--terracotta);
      color: var(--cream);
      border-color: var(--terracotta);
    }

    main {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 3rem 6vw;
    }

    /* Tabs Layout */
    .tabs {
      display: flex;
      gap: 1.5rem;
      border-bottom: 1px solid var(--line);
      margin-bottom: 2.5rem;
    }

    .tab-btn {
      background: none;
      border: none;
      padding: 12px 6px;
      font-family: 'Work Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: rgba(43, 40, 38, 0.5);
      cursor: pointer;
      position: relative;
      transition: color 0.3s;
    }

    .tab-btn:hover {
      color: var(--charcoal);
    }

    .tab-btn.active {
      color: var(--terracotta);
      font-weight: 600;
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--terracotta);
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Table & Card Components */
    .card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 10px 30px rgba(43, 40, 38, 0.03);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .section-header h2 {
      font-size: 1.8rem;
      font-family: 'Fraunces', serif;
    }

    .btn-action {
      background: var(--terracotta);
      color: var(--cream);
      border: none;
      padding: 12px 24px;
      border-radius: 100px;
      font-family: 'Work Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
    }

    .btn-action:hover {
      background: #a8331f;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(192, 57, 43, 0.12);
    }

    .btn-secondary-action {
      background: white;
      border: 1px solid var(--line);
      color: var(--charcoal);
      padding: 12px 24px;
      border-radius: 100px;
      font-family: 'Work Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-secondary-action:hover {
      background: var(--cream);
      border-color: var(--charcoal);
    }

    /* Products Grid */
    .products-table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th, td {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
    }

    th {
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      color: rgba(43, 40, 38, 0.6);
    }

    td {
      font-size: 0.95rem;
    }

    .td-img img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--line);
      display: block;
    }

    .td-tag {
      display: inline-block;
      background: rgba(43, 40, 38, 0.05);
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 100px;
      font-weight: 500;
    }

    .td-grid {
      font-family: monospace;
      color: var(--gold);
      font-weight: bold;
    }

    .row-actions {
      display: flex;
      gap: 10px;
    }

    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .btn-icon:hover {
      background: var(--cream);
    }

    .btn-edit-icon { color: var(--gold); }
    .btn-delete-icon { color: var(--error); }

    /* Form Styles */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
      color: rgba(43, 40, 38, 0.7);
    }

    input[type="text"],
    input[type="tel"],
    textarea,
    select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-family: 'Work Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s;
      background: white;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--terracotta);
      box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.08);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(43, 40, 38, 0.4);
      backdrop-filter: blur(5px);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 24px;
      border: 1px solid var(--line);
      padding: 2.5rem;
      box-shadow: 0 30px 60px rgba(43, 40, 38, 0.15);
      animation: modalSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    /* Custom scrollbar for modal */
    .modal-content::-webkit-scrollbar {
      width: 8px;
    }
    .modal-content::-webkit-scrollbar-track {
      background: transparent;
    }
    .modal-content::-webkit-scrollbar-thumb {
      background: rgba(43, 40, 38, 0.2);
      border-radius: 10px;
    }

    .modal-scroll-controls {
      position: fixed;
      right: calc(50% - 340px);
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 110;
    }

    @media (max-width: 700px) {
      .modal-scroll-controls {
        right: 15px;
        bottom: 20px;
        top: auto;
        transform: none;
      }
    }

    .btn-modal-scroll {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--charcoal);
      color: var(--cream);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(43, 40, 38, 0.2);
      transition: all 0.2s ease;
      opacity: 0.7;
    }

    .btn-modal-scroll:hover {
      opacity: 1;
      transform: scale(1.05);
      background: var(--terracotta);
    }

    @keyframes modalSlideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.8rem;
    }

    .modal-header h3 {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
    }

    .btn-close {
      background: none;
      border: none;
      font-size: 1.8rem;
      color: rgba(43, 40, 38, 0.4);
      cursor: pointer;
      line-height: 1;
    }

    .btn-close:hover {
      color: var(--charcoal);
    }

    /* Image upload styling */
    .upload-container {
      border: 2px dashed var(--line);
      padding: 1.5rem;
      border-radius: 12px;
      text-align: center;
      background: var(--cream);
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .upload-container:hover {
      border-color: var(--terracotta);
    }

    .upload-preview {
      width: 100%;
      max-height: 180px;
      object-fit: contain;
      border-radius: 8px;
      margin-top: 10px;
      display: none;
    }

    .upload-placeholder {
      font-size: 0.9rem;
      color: rgba(43, 40, 38, 0.6);
    }

    .upload-placeholder svg {
      margin-bottom: 8px;
      color: rgba(43, 40, 38, 0.4);
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--charcoal);
      color: var(--cream);
      padding: 14px 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(43, 40, 38, 0.15);
      z-index: 200;
      font-size: 0.92rem;
      font-weight: 500;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .toast.active {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.error {
      background: var(--error);
    }

    .toast.success {
      background: var(--success);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <a href="/" class="logo">LC<span>&</span>C</a>
      <span class="badge">Admin Panel</span>
    </div>
    <div style="display: flex; gap: 10px; align-items: center;">
      <a href="/" target="_blank" class="btn-view-site">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
        </svg>
        View Website
      </a>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </header>

  <main>
    <!-- Tab Controls -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('productsTab', this)">Crochet Collection</button>
      <button class="tab-btn" onclick="switchTab('configTab', this)">General Settings</button>
    </div>

    <!-- Products Collection Tab -->
    <div id="productsTab" class="tab-content active">
      <div class="card">
        <div class="section-header">
          <h2>Product Inventory</h2>
          <button class="btn-action" onclick="openAddModal()">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16" style="display:inline-block; vertical-align:middle;">
              <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
            </svg>
            Add New Product
          </button>
        </div>

        <div class="products-table-container">
          <table>
            <thead>
              <tr>
                <th width="80">Image</th>
                <th>Product Title</th>
                <th>Category Tag</th>
                <th width="130">Price (SSP)</th>
                <th width="120">Grid Layout</th>
                <th width="100" style="text-align: right;">Actions</th>
              </tr>
            </thead>
            <tbody id="productsTableBody">
              <tr>
                <td colspan="5" style="text-align: center; color: rgba(43, 40, 38, 0.5);">Loading products...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- General Settings Tab -->
    <div id="configTab" class="tab-content">
      <div class="card">
        <div class="section-header">
          <h2>Page Copy & Contact Settings</h2>
        </div>

        <form id="configForm">
          <h3 style="font-family: 'Fraunces', serif; font-size: 1.25rem; margin-bottom: 1.2rem; border-bottom: 1px solid var(--line); padding-bottom: 8px;">Contact details</h3>
          <div class="form-row">
            <div class="form-group">
              <label for="whatsappNumber">WhatsApp Number (Display)</label>
              <input type="text" id="whatsappNumber" name="whatsappNumber" required placeholder="0926 609 241">
            </div>
            <div class="form-group">
              <label for="whatsappLink">WhatsApp Link (URL)</label>
              <input type="text" id="whatsappLink" name="whatsappLink" required placeholder="https://wa.me/0926609241">
            </div>
          </div>

          <h3 style="font-family: 'Fraunces', serif; font-size: 1.25rem; margin-top: 1rem; margin-bottom: 1.2rem; border-bottom: 1px solid var(--line); padding-bottom: 8px;">Hero Copywriting</h3>
          <div class="form-group">
            <label for="heroEyebrow">Hero Eyebrow Text</label>
            <input type="text" id="heroEyebrow" name="heroEyebrow" required placeholder="Hoop Loop Magic">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="heroTitlePrefix">Hero Title Prefix</label>
              <input type="text" id="heroTitlePrefix" name="heroTitlePrefix" required placeholder="Crafted by">
            </div>
            <div class="form-group">
              <label for="heroTitleItalic">Hero Title (Italic Accent Word)</label>
              <input type="text" id="heroTitleItalic" name="heroTitleItalic" required placeholder="hand,">
            </div>
          </div>

          <div class="form-group">
            <label for="heroTitleSuffix">Hero Title Suffix</label>
            <input type="text" id="heroTitleSuffix" name="heroTitleSuffix" required placeholder=" made to last.">
          </div>

          <div class="form-group">
            <label for="heroDescription">Hero Description Copy</label>
            <textarea id="heroDescription" name="heroDescription" required placeholder="Description..."></textarea>
          </div>

          <button type="submit" class="btn-action" style="margin-top: 1rem;">Save Configurations</button>
        </form>
      </div>
    </div>
  </main>

  <!-- Add/Edit Product Modal -->
  <div class="modal" id="productModal">
    <div class="modal-scroll-controls">
      <button class="btn-modal-scroll" onclick="document.getElementById('modalContent').scrollTo({top: 0, behavior: 'smooth'})" title="Scroll to Top">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/></svg>
      </button>
      <button class="btn-modal-scroll" onclick="document.getElementById('modalContent').scrollTo({top: document.getElementById('modalContent').scrollHeight, behavior: 'smooth'})" title="Scroll to Bottom">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
      </button>
    </div>
    
    <div class="modal-content" id="modalContent">
      <div class="modal-header">
        <h3 id="modalTitle">Add New Product</h3>
        <button class="btn-close" onclick="closeProductModal()">&times;</button>
      </div>
      
      <form id="productForm">
        <input type="hidden" id="productId" name="id">
        <input type="hidden" id="productExistingImgSrc" name="imgSrc">

        <div class="form-group">
          <label>Product Image</label>
          <div class="upload-container" onclick="triggerFileInput()">
            <input type="file" id="imageFileInput" accept="image/*" style="display: none;" onchange="handleImageFile(this)">
            <input type="hidden" id="imageBase64" name="imageBase64">
            <input type="hidden" id="imageName" name="imageName">
            
            <div class="upload-placeholder" id="uploadPlaceholder">
              <svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin: 0 auto 8px; display:block;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
              </svg>
              Click to select or upload an image
            </div>
            <img id="uploadPreview" class="upload-preview" alt="Preview">
          </div>
        </div>

        <div class="form-group">
          <label for="productTitle">Product Title</label>
          <input type="text" id="productTitle" name="title" required placeholder="e.g. Green Crochet Bag">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="productTag">Category Tag</label>
            <select id="productTag" name="tag" required>
              <option value="Signature Bag Collection">Signature Bag Collection</option>
              <option value="Statement Totes">Statement Totes</option>
              <option value="Evening Clutches">Evening Clutches</option>
              <option value="Accessories">Accessories</option>
              <option value="Wearable Art">Wearable Art</option>
              <option value="Signature Collection">Signature Collection</option>
            </select>
          </div>

          <div class="form-group">
            <label for="productPrice">Price (SSP)</label>
            <input type="number" id="productPrice" name="price" placeholder="e.g. 45000" min="0">
          </div>
        </div>
        
        <div class="form-group">
          <label for="productGridClass">Grid Layout Size</label>
          <select id="productGridClass" name="gridClass" required>
            <option value="g1">Large Feature (Grid g1 - double wide & high)</option>
            <option value="g2">Wide Banner (Grid g2 - double wide)</option>
            <option value="g3">Standard Box Left (Grid g3)</option>
            <option value="g4">Standard Box Right (Grid g4)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="productAlt">Alt Description (SEO)</label>
          <input type="text" id="productAlt" name="alt" placeholder="e.g. Handmade dark green cotton tote bag">
        </div>

        <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem;">
          <button type="button" class="btn-secondary-action" onclick="closeProductModal()">Cancel</button>
          <button type="submit" class="btn-action" id="saveProductBtn">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Toast Container -->
  <div id="toast" class="toast">Action completed successfully</div>

  <script>
    // App State
    let products = [];
    let config = {};
    let isEditing = false;

    // Load initial data
    window.addEventListener('DOMContentLoaded', () => {
      fetchProducts();
      fetchConfig();
    });

    // Tab Navigation
    function switchTab(tabId, el) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      
      document.getElementById(tabId).classList.add('active');
      el.classList.add('active');
    }

    // --- TOAST NOTIFICATIONS ---
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.className = 'toast active ' + type;
      
      setTimeout(() => {
        toast.classList.remove('active');
      }, 3000);
    }

    // --- READ PRODUCTS ---
    async function fetchProducts() {
      try {
        const res = await fetch('/api/products');
        products = await res.json();
        renderProductsTable();
      } catch (err) {
        console.error(err);
        showToast('Error fetching products list.', 'error');
      }
    }

    function renderProductsTable() {
      const tbody = document.getElementById('productsTableBody');
      if (products.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: rgba(43, 40, 38, 0.5);">No products found. Add your first item!</td></tr>`;
        return;
      }

      tbody.innerHTML = products.map(product => `
        <tr>
          <td class="td-img"><img src="${product.imgSrc}" alt="${product.alt || ''}"></td>
          <td style="font-weight: 500;">${product.title || product.alt}</td>
          <td><span class="td-tag">${product.tag}</span></td>
          <td style="font-weight: 600; color: var(--terracotta);">${product.price && product.price !== '0' ? 'SSP ' + parseInt(product.price).toLocaleString() : '<em style="color:rgba(43,40,38,0.4); font-style:normal;">Not set</em>'}</td>
          <td><span class="td-grid">${product.gridClass}</span></td>
          <td style="text-align: right;">
            <div class="row-actions" style="justify-content: flex-end;">
              <button class="btn-icon btn-edit-icon" onclick="openEditModal(${product.id})" title="Edit Product">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                </svg>
              </button>
              <button class="btn-icon btn-delete-icon" onclick="deleteProduct(${product.id})" title="Delete Product">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // --- READ CONFIG ---
    async function fetchConfig() {
      try {
        const res = await fetch('/api/config');
        config = await res.json();
        
        // Populate form fields
        document.getElementById('whatsappNumber').value = config.whatsappNumber || '';
        document.getElementById('whatsappLink').value = config.whatsappLink || '';
        document.getElementById('heroEyebrow').value = config.heroEyebrow || '';
        document.getElementById('heroTitlePrefix').value = config.heroTitlePrefix || '';
        document.getElementById('heroTitleItalic').value = config.heroTitleItalic || '';
        document.getElementById('heroTitleSuffix').value = config.heroTitleSuffix || '';
        document.getElementById('heroDescription').value = config.heroDescription || '';
      } catch (err) {
        console.error(err);
        showToast('Error loading settings configuration.', 'error');
      }
    }

    // --- UPDATE CONFIG ---
    document.getElementById('configForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const updatedConfig = {
        whatsappNumber: document.getElementById('whatsappNumber').value,
        whatsappLink: document.getElementById('whatsappLink').value,
        heroEyebrow: document.getElementById('heroEyebrow').value,
        heroTitlePrefix: document.getElementById('heroTitlePrefix').value,
        heroTitleItalic: document.getElementById('heroTitleItalic').value,
        heroTitleSuffix: document.getElementById('heroTitleSuffix').value,
        heroDescription: document.getElementById('heroDescription').value
      };

      try {
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updatedConfig)
        });

        const data = await res.json();
        if (res.ok && data.success) {
          showToast('Configuration settings updated successfully!');
          config = data.config;
        } else {
          showToast(data.error || 'Failed to save configuration settings.', 'error');
        }
      } catch (err) {
        console.error(err);
        showToast('Server error when updating settings.', 'error');
      }
    });

    // --- MODAL & IMAGE UPLOADER HANDLERS ---
    function triggerFileInput() {
      document.getElementById('imageFileInput').click();
    }

    function handleImageFile(input) {
      const file = input.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('imageBase64').value = e.target.result;
        document.getElementById('imageName').value = file.name;
        
        // Show preview
        const preview = document.getElementById('uploadPreview');
        preview.src = e.target.result;
        preview.style.display = 'block';
        document.getElementById('uploadPlaceholder').style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    function resetImageUpload() {
      document.getElementById('imageFileInput').value = '';
      document.getElementById('imageBase64').value = '';
      document.getElementById('imageName').value = '';
      document.getElementById('uploadPreview').style.display = 'none';
      document.getElementById('uploadPreview').src = '';
      document.getElementById('uploadPlaceholder').style.display = 'block';
    }

    function openAddModal() {
      isEditing = false;
      document.getElementById('modalTitle').innerText = 'Add New Product';
      document.getElementById('productForm').reset();
      document.getElementById('productId').value = '';
      document.getElementById('productExistingImgSrc').value = '';
      resetImageUpload();
      document.getElementById('productModal').classList.add('active');
    }

    function openEditModal(id) {
      isEditing = true;
      const product = products.find(p => p.id === id);
      if (!product) return;

      document.getElementById('modalTitle').innerText = 'Edit Product';
      document.getElementById('productId').value = product.id;
      document.getElementById('productTitle').value = product.title || product.alt || '';
      document.getElementById('productTag').value = product.tag;
      document.getElementById('productGridClass').value = product.gridClass;
      document.getElementById('productAlt').value = product.alt || '';
      document.getElementById('productPrice').value = product.price || '';
      document.getElementById('productExistingImgSrc').value = product.imgSrc;

      // Load existing image in preview
      const preview = document.getElementById('uploadPreview');
      preview.src = product.imgSrc;
      preview.style.display = 'block';
      document.getElementById('uploadPlaceholder').style.display = 'none';
      
      // Clear fresh inputs
      document.getElementById('imageBase64').value = '';
      document.getElementById('imageName').value = '';
      document.getElementById('imageFileInput').value = '';

      document.getElementById('productModal').classList.add('active');
    }

    function closeProductModal() {
      document.getElementById('productModal').classList.remove('active');
    }

    // --- CREATE & UPDATE PRODUCT ---
    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const saveBtn = document.getElementById('saveProductBtn');
      saveBtn.disabled = true;
      saveBtn.innerText = 'Saving...';

      const id = document.getElementById('productId').value;
      const title = document.getElementById('productTitle').value;
      const tag = document.getElementById('productTag').value;
      const gridClass = document.getElementById('productGridClass').value;
      const alt = document.getElementById('productAlt').value;
      const price = document.getElementById('productPrice').value;
      const imageBase64 = document.getElementById('imageBase64').value;
      const imageName = document.getElementById('imageName').value;
      const imgSrc = document.getElementById('productExistingImgSrc').value;

      const payload = {
        title, tag, gridClass, alt, price, imageBase64, imageName
      };

      let endpoint = '/api/products';
      
      if (isEditing) {
        payload.id = id;
        payload.imgSrc = imgSrc;
        endpoint = '/api/products/edit';
      }

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        
        if (res.ok && data.success) {
          showToast(isEditing ? 'Product updated successfully!' : 'Product added successfully!');
          closeProductModal();
          products = data.products;
          renderProductsTable();
        } else {
          showToast(data.error || 'Failed to save product.', 'error');
        }
      } catch (err) {
        console.error(err);
        showToast('Server error while saving product.', 'error');
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = 'Save Product';
      }
    });

    // --- DELETE PRODUCT ---
    async function deleteProduct(id) {
      if (!confirm('Are you sure you want to delete this product? This action cannot be undone.')) {
        return;
      }

      try {
        const res = await fetch('/api/products/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });

        const data = await res.json();
        if (res.ok && data.success) {
          showToast('Product deleted successfully.');
          products = data.products;
          renderProductsTable();
        } else {
          showToast(data.error || 'Failed to delete product.', 'error');
        }
      } catch (err) {
        console.error(err);
        showToast('Server error when deleting product.', 'error');
      }
    }

    // --- LOGOUT FLOW ---
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        const res = await fetch('/api/logout', { method: 'POST' });
        if (res.ok) {
          window.location.href = '/login.html';
        } else {
          showToast('Logout failed.', 'error');
        }
      } catch (err) {
        console.error(err);
        showToast('Server error during logout.', 'error');
      }
    });
  </script>
</body>
</html>
